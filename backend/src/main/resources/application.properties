# サーバーポート（Docker Composeが公開するポートと一致させる）
server.port=8080

# PostgreSQL接続URL
# "db" はDocker ComposeのサービスName。DockerのDNSで解決される
spring.datasource.url=jdbc:postgresql://db:5432/appdb

# データベースの認証情報（compose.yamlのDB環境変数と一致させること）
spring.datasource.username=appuser
spring.datasource.password=apppass

# PostgreSQL JDBCドライバークラス
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate設定
# "update": エンティティクラスに基づいてテーブルを自動生成・更新する
spring.jpa.hibernate.ddl-auto=update

# ログにSQLを表示する（学習・デバッグに便利）
spring.jpa.show-sql=true

# Spring DevTools: クラスファイルの変更を検知して自動再起動を有効化
spring.devtools.restart.enabled=true
